services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ck
      POSTGRES_USER: ck
      POSTGRES_PASSWORD: ck
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ck -d ck"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ck:ck@db:5432/ck
      ENABLE_VECTOR_INDEXING: "false"
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      LLM_API_BASE: http://host.docker.internal:11434/v1
      LLM_API_KEY: dummy
      LLM_MODEL: qwen2.5-coder:7b
      LANGGRAPH_ENABLED: "true"
      LANGGRAPH_CHECKPOINT_ENABLED: "false"
      LANGGRAPH_CHECKPOINT_URL: postgresql://ck:ck@db:5432/ck
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      REDIS_KEY_PREFIX: ck
      REPO_INDEX_LOCK_TTL_SECONDS: "1800"
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS: "120"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      API_KEY: ""
      REPO_SCAN_ALLOWED_ROOTS: /workspace/repos:/app/data
      REPO_SCAN_MAX_FILES: "5000"
      REPO_SCAN_MAX_FILE_BYTES: "1000000"
      INDEX_TASK_RETENTION_SECONDS: "86400"
      INDEX_TASK_MAX_ENTRIES: "1000"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - .:/workspace/repos/codewiki:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  redis_data:
